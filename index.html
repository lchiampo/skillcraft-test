<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillCraft</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #6c63ff;
      --accent-hover: #574fd6;
      --danger: #ff4d4d;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: 220px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 1rem 1rem 0.5rem;
    }

    .project-list { list-style: none; }

    .project-item {
      padding: 0.55rem 1rem;
      cursor: pointer;
      border-radius: 6px;
      margin: 0 0.4rem;
      font-size: 0.9rem;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-item:hover { background: var(--surface2); color: var(--text); }
    .project-item.active { background: var(--surface2); color: var(--text); font-weight: 600; }

    .sidebar-empty {
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .content-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .content-header .song-count {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .song-grid {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
      align-content: start;
    }

    /* Song card */
    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.15s;
    }

    .song-card:hover { border-color: #444; }

    .song-card .song-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-card .song-artist {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-card .song-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .song-card .dot { opacity: 0.4; }

    .download-btn {
      margin-top: 0.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      width: fit-content;
    }

    .download-btn:hover { background: var(--accent-hover); }

    .no-file {
      margin-top: 0.2rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    /* States */
    .state-msg {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem 0;
      text-align: center;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--muted);
      gap: 0.5rem;
    }

    .placeholder .big { font-size: 2.5rem; opacity: 0.3; }
    .placeholder p { font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <h1>SkillCraft</h1>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-label">Projects</div>
    <ul class="project-list" id="projectList"></ul>
  </aside>

  <main id="main">
    <div class="placeholder">
      <div class="big">♪</div>
      <p>Select a project to view songs</p>
    </div>
  </main>
</div>

<script>
  let activeProject = null;

  async function loadProjects() {
    const res = await fetch("/api/projects");
    const projects = await res.json();
    const list = document.getElementById("projectList");
    list.innerHTML = "";

    if (projects.length === 0) {
      list.innerHTML = '<li class="sidebar-empty">No projects yet</li>';
      return;
    }

    projects.forEach(name => {
      const li = document.createElement("li");
      li.className = "project-item";
      li.textContent = name;
      li.addEventListener("click", () => selectProject(name, li));
      list.appendChild(li);
    });
  }

  function selectProject(name, el) {
    document.querySelectorAll(".project-item").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
    activeProject = name;
    loadSongs(name);
  }

  function formatDuration(seconds) {
    if (!seconds && seconds !== 0) return null;
    const m = Math.floor(seconds / 60);
    const s = String(seconds % 60).padStart(2, "0");
    return `${m}:${s}`;
  }

  async function loadSongs(project) {
    const main = document.getElementById("main");
    main.innerHTML = `
      <div class="content-header">
        <h2>${escHtml(project)}</h2>
        <div class="song-count">Loading…</div>
      </div>
      <div class="song-grid"><div class="state-msg">Loading songs…</div></div>
    `;

    const res = await fetch(`/api/songs?project=${encodeURIComponent(project)}`);
    const songs = await res.json();

    const count = songs.length;
    const countLabel = count === 1 ? "1 song" : `${count} songs`;

    main.innerHTML = `
      <div class="content-header">
        <h2>${escHtml(project)}</h2>
        <div class="song-count">${countLabel}</div>
      </div>
      <div class="song-grid" id="songGrid"></div>
    `;

    const grid = document.getElementById("songGrid");

    if (count === 0) {
      grid.innerHTML = '<div class="state-msg">No songs in this project yet.</div>';
      return;
    }

    songs.forEach(song => {
      const duration = formatDuration(song.duration);
      const card = document.createElement("div");
      card.className = "song-card";
      card.innerHTML = `
        <div class="song-title" title="${escHtml(song.title)}">${escHtml(song.title)}</div>
        <div class="song-artist">${escHtml(song.artist)}</div>
        <div class="song-meta">
          ${duration ? `<span>${duration}</span><span class="dot">•</span>` : ""}
          <span>${escHtml(song.project)}</span>
        </div>
        ${song.file_path
          ? `<a class="download-btn" href="/api/songs/${song.id}/file">
               <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                 <path d="M8 1v9M4 7l4 4 4-4M2 14h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
               </svg>
               Download
             </a>`
          : `<span class="no-file">No file attached</span>`
        }
      `;
      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  loadProjects();
</script>
</body>
</html>
